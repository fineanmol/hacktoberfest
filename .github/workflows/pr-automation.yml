name: Comment · PR merge conflict help
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: read

jobs:
  hint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Comment on conflicting PRs (as fineanmol)
        id: hint_fineanmol
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMERGE_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/post-conflict-hint.js`);
            await run({ github, context, core });

      - name: Comment on conflicting PRs (fallback)
        if: steps.hint_fineanmol.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/post-conflict-hint.js`);
            await run({ github, context, core });
