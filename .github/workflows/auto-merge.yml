# Disabled: blind auto-merge allowed core-file PRs through. Merge manually or via maintainer scripts.
name: Auto-Merge PRs

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto_merge:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Disabled
        run: echo "Auto-merge is disabled for Hacktoberfest 2026. Review and merge PRs manually."
