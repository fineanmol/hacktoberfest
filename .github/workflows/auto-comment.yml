name: Auto Comment

# pull_request_target: comment on fork PRs (needs write on base repo)
on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  star-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on new pull request
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const body = [
              `@${author} Please Star ⭐️ the repo to earn **hacktober-accepted** label for the event.`,
              '',
              'Meanwhile if you want to work on this issue, please raise the PR and we will review and merge it.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

      - name: Comment on new issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const body = [
              `@${author} Please Star ⭐️ the repo to earn **hacktober-accepted** label for the event.`,
              '',
              'Meanwhile if you want to work on this issue, please raise the PR and we will review and merge it.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body,
            });
