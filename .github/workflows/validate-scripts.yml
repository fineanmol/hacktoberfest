name: Validate scripts on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate scripts introduced in this PR only
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          VALIDATE_LENIENT: 'true'
        run: |
          set -euo pipefail
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          mapfile -t CHANGED < <(
            git log --name-only --pretty=format: "${BASE_REF}..HEAD" -- scripts/ \
            | sort -u \
            | grep -vE '^$|__pycache__|\.pyc$|/\.vscode/|merge_pr|land_pr|repo_cleanup|tempCodeRunner|\.(out|exe|class)$|^scripts/output/' || true
          )
          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No script changes in PR commits — validation skipped (pass)."
            exit 0
          fi
          echo "Validating ${#CHANGED[@]} file(s) from PR commits:"
          printf '%s\n' "${CHANGED[@]}"
          node tools/validate-scripts.js "${CHANGED[@]}"
